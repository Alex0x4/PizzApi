<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="png" href="img/logo.png">
    <title>🍕PIZZAPI🍕</title>
</head> 
<body>
    <div class="header">
        <h1>🍕 PIZZAPI 🍕</h1>
        <p>Digita il nome della pizza</p>
    </div>
  
    <div class="search-box">
        <input id="search" type="text" placeholder="Es: Margherita"> 
        <button id="searchButton">Cerca</button>
    </div>
    
    <div id="results"></div>

    <!-- Modifica Pizza -->
    <div id="editModal" class="modal">
        <div class="modal-box">
            <h3>Modifica Pizza</h3>
            <input type="text" id="editNome" placeholder="Nuovo nome">
            <input type="text" id="editImg" placeholder="URL immagine">
            <button id="saveEdit">Salva</button>
            <button class="close-modal">Annulla</button>
        </div>
    </div>

    <!-- Gestisci Ingredienti -->
    <div id="ingModal" class="modal">
        <div class="modal-box">
            <h3>Ingredienti</h3>
            <div id="ingList"></div>
            <hr>
            <input type="text" id="newIng" placeholder="Nuovo ingrediente">
            <button id="addIng">Aggiungi</button>
            <button class="close-modal">Chiudi</button>
        </div>
    </div>

    <!-- Elimina Pizza -->
    <div id="deleteModal" class="modal">
        <div class="modal-box">
            <h3>Eliminare questa pizza?</h3>
            <button id="confirmDelete">Sì</button>
            <button class="close-modal">No</button>
        </div>
    </div>

    <footer>
        <p>© 2026 PIZZAPI | Alex - Dario - Stefan</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
